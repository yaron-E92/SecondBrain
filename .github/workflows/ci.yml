name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    name: Restore, build, and test
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET SDK
        id: setup-dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore cached .NET workloads
        id: restore-dotnet-workloads
        uses: actions/cache/restore@v4
        with:
          path: |
            'C:\Program Files\dotnet\packs'
            'C:\Program Files\dotnet\sdk-manifests'
            C:\ProgramData\dotnet\workload*
            'C:\Program Files\dotnet\metadata'
          key: ${{ runner.os }}-dotnet-${{ steps.setup-dotnet.outputs.dotnet-version }}-${{ hashFiles('**/global.json') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-${{ steps.setup-dotnet.outputs.dotnet-version }}-
            ${{ runner.os }}-dotnet-

      - name: Restore cached Android SDK
        id: restore-android-sdk
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}
            ${{ env.ANDROID_SDK_ROOT }}
            C:\Users\runneradmin\.android
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('**/global.json') }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-

      - name: Install MAUI workload
        if: steps.restore-dotnet-workloads.outputs.cache-hit != 'true'
        run: dotnet workload install maui --skip-manifest-update

      - name: Install Android SDK components
        if: steps.restore-android-sdk.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          & "$env:ANDROID_HOME\cmdline-tools\latest\bin\sdkmanager.bat" "tools"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to install Android SDK components"
            exit 1
          }

      - name: Save .NET workloads cache
        if: steps.restore-dotnet-workloads.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            'C:\Program Files\dotnet\packs'
            'C:\Program Files\dotnet\sdk-manifests'
            C:\ProgramData\dotnet\workload*
            'C:\Program Files\dotnet\metadata'
          key: ${{ runner.os }}-dotnet-${{ steps.setup-dotnet.outputs.dotnet-version }}-${{ hashFiles('**/global.json') }}

      - name: Save Android SDK cache
        if: steps.restore-android-sdk.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}
            ${{ env.ANDROID_SDK_ROOT }}
            C:\Users\runneradmin\.android
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('**/global.json') }}

      - name: Restore dependencies
        run: dotnet restore SecondBrain.slnx

      - name: Build
        run: dotnet build SecondBrain.slnx --configuration Debug --no-restore

      - name: Test
        run: dotnet test SecondBrain.slnx --configuration Debug --no-build --no-restore
